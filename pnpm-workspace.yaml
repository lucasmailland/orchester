packages:
  - "apps/*"
  - "packages/*"
  # Note: vendor/mnemosyne is NOT a workspace package — it's a git submodule
  # that builds itself in isolation (with its own pnpm install) before the
  # main install runs, keeping its toolchain (TypeScript 6, tsup) out of
  # orchester's node_modules. apps/web consumes the built SDK artifact via
  # `file:../../vendor/mnemosyne/packages/client-ts` — orchester talks to
  # mnemosyne exclusively over HTTP, so only the @mnemosyne/client-ts SDK is
  # built here, not core. The bootstrap is handled by
  # scripts/bootstrap-vendor.sh and the CI workflow. When
  # @mnemosyne/client-ts@3.x publishes to npm, replace `file:…` with a
  # version range and drop the submodule + bootstrap script.
