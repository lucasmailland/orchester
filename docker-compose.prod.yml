# Orchester — 100% open-source self-hosted production stack.
#
# Servicios:
#   web       Next.js (Orchester app)
#   worker    Procesa flows async + ingest de KB (pg-boss queue dentro de Postgres)
#   postgres  Postgres 16 + pgvector (DB principal + cola pg-boss)
#   minio     S3-compatible blob storage (uploads de KB / archivos)
#   caddy     Reverse proxy con auto-TLS Let's Encrypt
#   glitchtip Sentry-compatible error tracking (opcional, profile: observability)
#   posthog   Product analytics (opcional, profile: analytics)
#
# Levantar todo:
#   docker compose -f docker-compose.prod.yml up -d
#
# Levantar con observability:
#   docker compose -f docker-compose.prod.yml --profile observability up -d
#
# Variables esperadas en .env (al lado de este archivo):
#   DOMAIN, AUTH_SECRET, ENCRYPTION_SECRET,
#   POSTGRES_PASSWORD, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD,
#   ANTHROPIC_API_KEY (o el provider que uses), SMTP_*

version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchester
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: orchester
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./.agents/reference/init-indices.sql:/docker-entrypoint-initdb.d/10-indices.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchester -d orchester"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # One-shot: crea el bucket "orchester" si no existe.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/orchester;
      mc anonymous set download local/orchester/public 2>/dev/null || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://orchester:${POSTGRES_PASSWORD}@postgres:5432/orchester
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_URL: https://${DOMAIN:?set DOMAIN in .env}
      NEXT_PUBLIC_APP_URL: https://${DOMAIN}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:?set ENCRYPTION_SECRET in .env}
      # Storage → MinIO
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: orchester
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      # Mail → SMTP del cliente (Plunk, Postal, Mailcow, lo que sea)
      MAIL_DRIVER: smtp
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@${DOMAIN}}
      # AI providers (uno o más; el resto vacío)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      # Observability (opcional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      # Self-host = sin Stripe → plan unlimited
      SELF_HOSTED: "true"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # El worker comparte libs con Next que importan `server-only`; correrlo con
    # tsx dispara ERR_REQUIRE_CYCLE_MODULE (Node ≥22) + el throw de server-only.
    # Lo bundleamos con esbuild (alias server-only→vacío) y corremos node puro.
    command: ["sh", "-c", "node apps/web/worker/build.mjs && node apps/web/worker/.dist/worker.mjs"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
      DATABASE_URL: postgresql://orchester:${POSTGRES_PASSWORD}@postgres:5432/orchester
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: orchester
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      SELF_HOSTED: "true"
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - web
    logging: *default-logging

  # ─── Observability (opcional) ─────────────────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:latest
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      - postgres
      - glitchtip-redis
    environment:
      DATABASE_URL: postgresql://orchester:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET:-change-me}
      PORT: "8000"
      EMAIL_URL: smtp://${SMTP_USER}:${SMTP_PASS}@${SMTP_HOST}:${SMTP_PORT}
      GLITCHTIP_DOMAIN: https://errors.${DOMAIN}
      DEFAULT_FROM_EMAIL: ${MAIL_FROM:-noreply@${DOMAIN}}
      CELERY_WORKER_AUTOSCALE: "1,3"
      REDIS_URL: redis://glitchtip-redis:6379/0
    expose:
      - "8000"
    logging: *default-logging

  glitchtip-redis:
    image: redis:7-alpine
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - glitchtip-redis:/data
    logging: *default-logging

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
  glitchtip-redis:
