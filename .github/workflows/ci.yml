name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Scan submodules too — vendor/mnemosyne is third-party-style code
          # that should still be vetted for committed secrets.
          submodules: recursive
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  test:
    name: Lint · Type · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: secret-scan

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: orchester
          POSTGRES_PASSWORD: orchester
          POSTGRES_DB: orchester
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://orchester:orchester@localhost:5432/orchester
      BETTER_AUTH_SECRET: ci-test-secret-not-real-32chars-ok
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ENCRYPTION_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - uses: actions/checkout@v7
        # submodules:recursive pulls in vendor/mnemosyne (pinned to the SHA
        # tracked in .gitmodules / the parent tree). Without this, the
        # bootstrap step below can't find the submodule.
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # Build @mnemosyne/core IN ISOLATION before the main install.
      # See scripts/bootstrap-vendor.sh for the why (peer-dep bleed-through).
      # This produces vendor/mnemosyne/packages/core/dist/*, which apps/web's
      # file: dependency then resolves in the main pnpm install below.
      - name: Bootstrap vendor submodules
        run: bash scripts/bootstrap-vendor.sh

      - name: Install
        run: pnpm install --frozen-lockfile

      # Defensive: the baseline migration (0000_baseline.sql) also runs
      # `CREATE EXTENSION IF NOT EXISTS vector;` as its first statement, so this
      # is redundant but harmless and keeps CI robust to migration reordering.
      - name: Enable pgvector
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector;"

      # Apply committed SQL migrations (reviewable, versioned) — NOT push --force.
      - name: Apply migrations
        run: pnpm --filter @orchester/db migrate

      - name: TypeScript check
        run: pnpm --filter web tsc --noEmit

      - name: Audit invariants (RBAC + zod + spend guard + metering + flow signal)
        run: bash scripts/audit-invariants.sh

      - name: Tests
        run: pnpm --filter web vitest run

      - name: Build
        run: pnpm --filter web build
