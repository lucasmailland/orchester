# Dependabot — keeps deps up to date with grouped, reviewable PRs.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # ── npm (root + workspaces) ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # All non-security patch + minor bumps grouped into one PR per week.
      patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      # Security advisories: one PR per advisory, no grouping (faster review).
      security:
        applies-to: security-updates
        patterns:
          - "*"
    # Major bumps land as their own PR — review them carefully.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # ── Docker (if/when we publish images) ──────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
