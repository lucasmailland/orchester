<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-label="Orchester teams pattern: an orchestrator running claude-opus-4 receives every message, classifies intent and delegates to one of three specialists — sales, support, or ops.">
  <title>Teams, not lone agents</title>
  <desc>An orchestrator card sits at the top, labeled "Orchestrator · claude-opus-4 · decides who handles what, when, with what". A single connector descends and fans out into three specialist cards below: Sales specialist, Support specialist, Ops specialist. Each specialist owns its tools, persona, model and nothing else, so observability of "which specialist did what and why" is structural.</desc>

  <defs>
    <linearGradient id="t-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#8a98ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="t-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="t-grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1a2440" stroke-width="0.5" stroke-opacity="0.45"/>
    </pattern>
    <marker id="t-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a98ff"/>
    </marker>
    <style><![CDATA[
      @keyframes t-pulse {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.2); }
      }
      @keyframes t-flow {
        from { stroke-dashoffset: 24; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes t-glow-orch {
        0%, 100% { filter: drop-shadow(0 0 0   rgba(138, 152, 255, 0)); }
        50%      { filter: drop-shadow(0 0 16px rgba(138, 152, 255, 0.55)); }
      }
      @keyframes t-glow-spec-1 {
        0%, 100% { filter: drop-shadow(0 0 0   rgba(34, 211, 238, 0)); }
        50%      { filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.45)); }
      }
      @keyframes t-glow-spec-2 {
        0%, 100% { filter: drop-shadow(0 0 0   rgba(167, 139, 250, 0)); }
        50%      { filter: drop-shadow(0 0 12px rgba(167, 139, 250, 0.45)); }
      }
      @keyframes t-glow-spec-3 {
        0%, 100% { filter: drop-shadow(0 0 0   rgba(52, 211, 153, 0)); }
        50%      { filter: drop-shadow(0 0 12px rgba(52, 211, 153, 0.45)); }
      }
      .t-pulse-a { transform-origin: center; transform-box: fill-box;
                   animation: t-pulse 2.6s ease-in-out infinite; }
      .t-pulse-b { transform-origin: center; transform-box: fill-box;
                   animation: t-pulse 2.6s ease-in-out infinite 0.45s; }
      .t-pulse-c { transform-origin: center; transform-box: fill-box;
                   animation: t-pulse 2.6s ease-in-out infinite 0.9s; }
      .t-pulse-d { transform-origin: center; transform-box: fill-box;
                   animation: t-pulse 2.6s ease-in-out infinite 1.35s; }
      .t-flow      { stroke-dasharray: 6 6; animation: t-flow 1.8s linear infinite; }
      .t-orch-glow   { animation: t-glow-orch   3s ease-in-out infinite; }
      .t-spec1-glow  { animation: t-glow-spec-1 3.4s ease-in-out infinite; }
      .t-spec2-glow  { animation: t-glow-spec-2 3.4s ease-in-out infinite 0.5s; }
      .t-spec3-glow  { animation: t-glow-spec-3 3.4s ease-in-out infinite 1s; }
      @media (prefers-reduced-motion: reduce) {
        .t-pulse-a, .t-pulse-b, .t-pulse-c, .t-pulse-d,
        .t-flow,
        .t-orch-glow, .t-spec1-glow, .t-spec2-glow, .t-spec3-glow {
          animation: none;
        }
      }
    ]]></style>
  </defs>

  <rect width="1200" height="540" fill="#0a1020"/>
  <rect width="1200" height="540" fill="url(#t-grid)"/>
  <rect x="24" y="24" width="1152" height="492" rx="16" fill="none" stroke="#1f2c4a" stroke-width="1" stroke-opacity="0.7"/>

  <text x="60" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="0.22em" fill="#6e7c9c">TEAM TOPOLOGY · ORCHESTRATOR DELEGATES TO SPECIALISTS</text>

  <!-- Orchestrator (top centre) -->
  <g transform="translate(420, 100)" filter="url(#t-shadow)">
    <rect class="t-orch-glow" width="360" height="120" rx="16" fill="#0f1729" stroke="#8a98ff" stroke-width="1.8" stroke-opacity="0.85"/>
    <circle class="t-pulse-a" cx="32" cy="32" r="6" fill="#8a98ff"/>
    <circle cx="32" cy="32" r="10" fill="none" stroke="#8a98ff" stroke-width="0.8" opacity="0.5"/>
    <text x="52" y="38" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="18" font-weight="700" fill="#f4f7fc">Orchestrator</text>
    <text x="52" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#a5b4fc">claude-opus-4</text>
    <text x="52" y="84" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="13" fill="#cbd5e1">classifies intent · delegates</text>
    <text x="52" y="104" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b9bc7">emits delegation audit event</text>
  </g>

  <!-- Trunk down from orchestrator (centre column) -->
  <line class="t-flow" x1="600" y1="220" x2="600" y2="290" stroke="url(#t-edge)" stroke-width="1.8" fill="none"/>

  <!-- Horizontal distribution bar at y=290 -->
  <line x1="240" y1="290" x2="960" y2="290" stroke="#3b4a7a" stroke-width="1.4" stroke-opacity="0.6"/>

  <!-- 3 vertical drops into the 3 specialists -->
  <line class="t-flow" x1="240" y1="290" x2="240" y2="340" stroke="url(#t-edge)" stroke-width="1.6" fill="none" marker-end="url(#t-arrow)" stroke-dasharray="5 5"/>
  <line class="t-flow" x1="600" y1="290" x2="600" y2="340" stroke="url(#t-edge)" stroke-width="1.6" fill="none" marker-end="url(#t-arrow)" stroke-dasharray="5 5"/>
  <line class="t-flow" x1="960" y1="290" x2="960" y2="340" stroke="url(#t-edge)" stroke-width="1.6" fill="none" marker-end="url(#t-arrow)" stroke-dasharray="5 5"/>

  <!-- Sales specialist (left) -->
  <g transform="translate(120, 348)" filter="url(#t-shadow)">
    <rect class="t-spec1-glow" width="240" height="120" rx="14" fill="#0b1322" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.8"/>
    <circle class="t-pulse-b" cx="24" cy="28" r="6" fill="#22d3ee"/>
    <circle cx="24" cy="28" r="10" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.5"/>
    <text x="44" y="34" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="16" font-weight="700" fill="#f4f7fc">Sales</text>
    <text x="44" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#67e8f9">specialist</text>
    <text x="14" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#a5f3fc">tools · persona · model</text>
    <text x="14" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#8b9bc7">+ nothing else</text>
  </g>

  <!-- Support specialist (centre) -->
  <g transform="translate(480, 348)" filter="url(#t-shadow)">
    <rect class="t-spec2-glow" width="240" height="120" rx="14" fill="#1a1224" stroke="#a78bfa" stroke-width="1.4" stroke-opacity="0.8"/>
    <circle class="t-pulse-c" cx="24" cy="28" r="6" fill="#a78bfa"/>
    <circle cx="24" cy="28" r="10" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <text x="44" y="34" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="16" font-weight="700" fill="#f4f7fc">Support</text>
    <text x="44" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#d8b4fe">specialist</text>
    <text x="14" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#e9d5ff">tools · persona · model</text>
    <text x="14" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#8b9bc7">+ nothing else</text>
  </g>

  <!-- Ops specialist (right) -->
  <g transform="translate(840, 348)" filter="url(#t-shadow)">
    <rect class="t-spec3-glow" width="240" height="120" rx="14" fill="#052e16" stroke="#34d399" stroke-width="1.4" stroke-opacity="0.8"/>
    <circle class="t-pulse-d" cx="24" cy="28" r="6" fill="#34d399"/>
    <circle cx="24" cy="28" r="10" fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <text x="44" y="34" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif" font-size="16" font-weight="700" fill="#f4f7fc">Ops</text>
    <text x="44" y="54" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6ee7b7">specialist</text>
    <text x="14" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#a7f3d0">tools · persona · model</text>
    <text x="14" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#8b9bc7">+ nothing else</text>
  </g>

  <!-- Bottom strap: tagline -->
  <text x="600" y="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#6e7c9c">a single agent isn't an AI system · it's a chatbot</text>
</svg>
