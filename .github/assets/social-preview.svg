<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Orchester — Build and orchestrate AI agents">
  <defs>
    <!-- Background: deep slate with soft radial highlight -->
    <radialGradient id="bgGlow" cx="20%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#1a2942" stop-opacity="1"/>
      <stop offset="55%" stop-color="#0b1322" stop-opacity="1"/>
      <stop offset="100%" stop-color="#05080f" stop-opacity="1"/>
    </radialGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c8cff"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Node glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2742" stroke-width="0.5" stroke-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGlow)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Subtle outer frame -->
  <rect x="32" y="32" width="1216" height="576" rx="20" fill="none" stroke="#2a3a5e" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Accent corner mark -->
  <g transform="translate(72, 80)">
    <rect width="44" height="44" rx="10" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="22" cy="22" r="6" fill="url(#accent)"/>
  </g>
  <text x="132" y="111" font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, sans-serif" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="0.18em">ORCHESTER</text>

  <!-- Wordmark -->
  <text x="72" y="310" font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, sans-serif" font-size="118" font-weight="800" fill="#f1f5f9" letter-spacing="-0.04em">Build agents.</text>
  <text x="72" y="430" font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, sans-serif" font-size="118" font-weight="800" fill="url(#accent)" letter-spacing="-0.04em">Orchestrate flows.</text>

  <!-- Tagline -->
  <text x="72" y="500" font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0.005em">Open-source platform for AI agents and workflow automation.</text>

  <!-- Pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">
    <g transform="translate(72, 545)">
      <rect width="138" height="34" rx="17" fill="#0f1729" stroke="#2a3a5e" stroke-width="1"/>
      <text x="20" y="22">Multi-tenant</text>
    </g>
    <g transform="translate(222, 545)">
      <rect width="148" height="34" rx="17" fill="#0f1729" stroke="#2a3a5e" stroke-width="1"/>
      <text x="20" y="22">80+ providers</text>
    </g>
    <g transform="translate(382, 545)">
      <rect width="128" height="34" rx="17" fill="#0f1729" stroke="#2a3a5e" stroke-width="1"/>
      <text x="20" y="22">Self-hosted</text>
    </g>
    <g transform="translate(522, 545)">
      <rect width="100" height="34" rx="17" fill="#0f1729" stroke="#2a3a5e" stroke-width="1"/>
      <text x="20" y="22">Apache 2.0</text>
    </g>
  </g>

  <!-- Flow graphic on the right -->
  <g transform="translate(820, 180)" filter="url(#nodeGlow)">
    <!-- Edges -->
    <path d="M 90 50 C 200 50, 200 160, 310 160" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <path d="M 90 50 C 200 50, 200 -30, 310 -30" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <path d="M 400 160 C 510 160, 510 70, 620 70" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <path d="M 400 -30 C 510 -30, 510 70, 620 70" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>

    <!-- Node: trigger -->
    <g transform="translate(0, 20)">
      <rect width="90" height="60" rx="12" fill="#101a30" stroke="#3a4a72" stroke-width="1.5"/>
      <circle cx="20" cy="30" r="6" fill="#22d3ee"/>
      <text x="34" y="35" font-family="ui-monospace, monospace" font-size="13" fill="#cbd5e1">Trigger</text>
    </g>
    <!-- Node: agent -->
    <g transform="translate(310, -60)">
      <rect width="90" height="60" rx="12" fill="#101a30" stroke="#7c8cff" stroke-width="1.5"/>
      <circle cx="20" cy="30" r="6" fill="#7c8cff"/>
      <text x="34" y="35" font-family="ui-monospace, monospace" font-size="13" fill="#cbd5e1">Agent</text>
    </g>
    <!-- Node: tool -->
    <g transform="translate(310, 130)">
      <rect width="90" height="60" rx="12" fill="#101a30" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="20" cy="30" r="6" fill="#a78bfa"/>
      <text x="34" y="35" font-family="ui-monospace, monospace" font-size="13" fill="#cbd5e1">Tool</text>
    </g>
    <!-- Node: output -->
    <g transform="translate(620, 40)">
      <rect width="90" height="60" rx="12" fill="#101a30" stroke="#22d3ee" stroke-width="1.5"/>
      <circle cx="20" cy="30" r="6" fill="#22d3ee"/>
      <text x="34" y="35" font-family="ui-monospace, monospace" font-size="13" fill="#cbd5e1">Output</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="1208" y="585" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#64748b">github.com/lucasmailland/orchester</text>
</svg>
